name = "pcn-wiki-queue"
main = "src/index.js"
compatibility_date = "2024-11-01"

# KV namespace for the submission queue.
# Create it once with:  npx wrangler kv namespace create QUEUE_KV
# then paste the returned id below (replace REPLACE_WITH_KV_ID).
[[kv_namespaces]]
binding = "QUEUE_KV"
id = "REPLACE_WITH_KV_ID"

# Optional: lock down /clear and /remove with a secret. Set it with:
#   npx wrangler secret put ADMIN_TOKEN
# If you don't set it, those admin endpoints are open (ok for a personal site).
